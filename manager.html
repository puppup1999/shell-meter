<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบันทึกมิเตอร์น้ำมัน</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">MANAGER PORTAL</div>
            <div class="date-display" id="currentDate"></div>
            <div style="display: flex; gap: 8px; align-items: center; margin-left: 10px;">
                <button onclick="fetchData()" id="refreshBtn" class="btn-refresh" title="Refresh Data">↻</button>
                <a href="index.html" style="font-size: 0.85rem; color: var(--text-primary); text-decoration: none; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; font-weight: 600;">Logout to Staff</a>
            </div>
        </header>

        <main id="mainContent">
            <!-- Content will be injected here by app.js -->
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="meter">
                <span class="icon">📊</span>
                <span class="label">เลขมิเตอร์</span>
            </button>
            <button class="nav-item" data-tab="sales">
                <span class="icon">💰</span>
                <span class="label">ยอดขาย</span>
            </button>
            <button class="nav-item" data-tab="reco">
                <span class="icon">🔄</span>
                <span class="label">Fuel Reco</span>
            </button>
        </nav>

        <button id="addBtn" class="fab">+</button>
    </div>

    <!-- Modal for Data Entry -->
    <div id="entryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>บันทึกเลขมิเตอร์</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="meterForm">
                <div class="form-group date-input">
                    <label>วันที่</label>
                    <input type="date" id="inputDate" required>
                </div>
                <div class="heads-grid" id="headsGrid">
                    <!-- 18 Inputs will be generated here -->
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
